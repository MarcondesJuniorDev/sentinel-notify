services:

  app:
    build: .
    container_name: sentinel_app
    volumes:
      - .:/var/www/html
    expose:
      - "9000"
    depends_on: [ db, redis ]
    networks: [ sentinel_network ]

  nginx:
    image: nginx:1.25-alpine
    container_name: sentinel_nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
    depends_on:
      - app
    networks: [ sentinel_network ]

  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: secret
    networks: [ sentinel_network ]

  redis:
    image: redis:alpine
    container_name: sentinel_redis
    networks: [ sentinel_network ]

  mailpit: # Captura e-mails para teste local
    image: axllent/mailpit
    ports: [ "8025:8025" ]
    networks: [ sentinel_network ]

networks:
  sentinel_network:
    driver: bridge
